name: Release

# Push a tag like v1.1.0 to build the app and publish a GitHub Release
# with auto-generated notes (the changelog of commits since the last tag).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the build derives the version/build number

      - name: Build app bundle
        run: ./make-app.sh

      - name: Zip the app
        run: |
          cd dist
          zip -r -y "../SmarterShot-${GITHUB_REF_NAME}.zip" SmarterShot.app

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "SmarterShot-${GITHUB_REF_NAME}.zip" \
            --title "SmarterShot ${GITHUB_REF_NAME}" \
            --generate-notes
